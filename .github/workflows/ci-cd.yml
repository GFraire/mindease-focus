name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  pr-guard:
    name: PR Guard
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Validate source branch
        run: |
          echo "Branch origem: ${{ github.head_ref }}"

          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "❌ PR para main só pode vir da branch develop."
            exit 1
          fi

          echo "✅ PR válido"

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: pr-guard
    if: always() && (needs.pr-guard.result == 'success' || github.event_name != 'pull_request')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Execute tests
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Deploy Vercel Production
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
